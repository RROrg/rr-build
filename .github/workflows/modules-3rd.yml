name: Get modules 3rd

on:
  workflow_dispatch:

jobs:
  i915:
    strategy:
      matrix:
        include:
          - version: 7.1
            platform: epyc7002

          - version: 7.2
            platform: epyc7002
          - version: 7.2
            platform: geminilakenk
          - version: 7.2
            platform: r1000nk
          - version: 7.2
            platform: v1000nk

          - version: 7.3
            platform: epyc7002
          - version: 7.3
            platform: geminilakenk
          - version: 7.3
            platform: r1000nk
          - version: 7.3
            platform: v1000nk

          - version: 7.4
            platform: epyc7002
          - version: 7.4
            platform: epyc7003
          - version: 7.4
            platform: epyc7003ntb
          - version: 7.4
            platform: geminilakenk
          - version: 7.4
            platform: icelaked
          - version: 7.4
            platform: r1000nk
          - version: 7.4
            platform: v1000nk

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          repository: RROrg/intel-gpu-i915-backports
          token: ${{ secrets.RRORG }}
          path: intel-gpu-i915-backports

      - name: Init Env
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          sudo timedatectl set-timezone "Asia/Shanghai"

      - name: Build
        run: |
          ROOT_PATH=${{ github.workspace }}
          VERSION=${{ matrix.version }}
          PLATFORM=${{ matrix.platform }}
  
          echo "getting toolkit"
          for N in env dev; do
            curl -skL "https://global.synologydownload.com/download/ToolChain/toolkit/${VERSION}/${PLATFORM}/ds.${PLATFORM}-${VERSION}.${N}.txz" -o "${ROOT_PATH}/ds.${PLATFORM}-${VERSION}.${N}.txz"
          done

          for N in env dev; do
            [ ! -f "${ROOT_PATH}/ds.${PLATFORM}-${VERSION}.${N}.txz" ] && {
              echo "ds.${PLATFORM}-${VERSION}.${N}.txz file not found"
              exit 1
            }
            mkdir -p "${ROOT_PATH}/ds.${PLATFORM}-${VERSION}.${N}"
            tar -xhf "${ROOT_PATH}/ds.${PLATFORM}-${VERSION}.${N}.txz" -C "${ROOT_PATH}/ds.${PLATFORM}-${VERSION}.${N}"
          done

          echo "building modules"
          export CROSS_COMPILE=${ROOT_PATH}/ds.${PLATFORM}-${VERSION}.env/usr/local/x86_64-pc-linux-gnu/bin/x86_64-pc-linux-gnu-
          export KLIB_BUILD=${ROOT_PATH}/ds.${PLATFORM}-${VERSION}.dev/usr/local/x86_64-pc-linux-gnu/x86_64-pc-linux-gnu/sys-root/usr/lib/modules/DSM-${VERSION}/build
          (
            cd "${ROOT_PATH}/intel-gpu-i915-backports"
            make defconfig-drm
            make -j"$(nproc)"
            make -C "${KLIB_BUILD}" M="${PWD}" INSTALL_MOD_PATH="${PWD}/intermediates" INSTALL_MOD_STRIP=1 CONFIG_MODULE_SIG_ALL= _emodinst_
          )
          KVERSION=$(cat ${KLIB_BUILD}/Makefile | grep ^VERSION | awk -F' ' '{print $3}')
          PATCHLEVEL=$(cat ${KLIB_BUILD}/Makefile | grep ^PATCHLEVEL | awk -F' ' '{print $3}')
          SUBLEVEL=$(cat ${KLIB_BUILD}/Makefile | grep ^SUBLEVEL | awk -F' ' '{print $3}')
          KVER="${KVERSION}.${PATCHLEVEL}.${SUBLEVEL}"

          MODULES_INTERMEDIATES="${ROOT_PATH}/intel-gpu-i915-backports/intermediates"
          if [ ${PLATFORM} = "geminilakenk" ]; then
            OUT_MODULES="${ROOT_PATH}/output/update"
          else
            OUT_MODULES="${ROOT_PATH}/output"
          fi
          mkdir -p "${OUT_MODULES}"
          find "${MODULES_INTERMEDIATES}" -type f -name '*.ko' -exec mv {} "${OUT_MODULES}" \;

          tar -zcf ${ROOT_PATH}/i915-${PLATFORM}-${VERSION}-${KVER}.tgz -C ${OUT_MODULES} .

      - name: Upload to Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: i915-${{ matrix.version }}-${{ matrix.platform }}
          path: |
            i915-*.tgz

  release:
    runs-on: ubuntu-latest
    needs: i915
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          repository: RROrg/rr-modules
          token: ${{ secrets.RRORG }}
          path: rr-modules

      - name: Init Env
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          sudo timedatectl set-timezone "Asia/Shanghai"

      - name: download to artifacts
        uses: actions/download-artifact@v4
        with:
          path: output
          pattern: i915-*
          merge-multiple: true

      - name: delete-artifact
        uses: geekyeggo/delete-artifact@v5
        with:
          name: |
            i915-*

      - name: firmware
        run: |
          ROOT_PATH=${{ github.workspace }}

          echo "extract all modules"
          OUT_MODULES="${ROOT_PATH}/rr-modules/thirdparty"
          for F in output/i915-*.tgz; do
            echo "${F}"
            DIR_NAME="${OUT_MODULES}/$(echo $(basename "${F}" .tgz 2>/dev/null) | sed 's/^i915-//')"
            rm -rf "${DIR_NAME}"
            mkdir -p "${DIR_NAME}"
            tar -zxf "${F}" -C "${DIR_NAME}" || echo "Failed to extract ${F}"
          done

          SOURCE="${ROOT_PATH}/linux-firmware"
          DEST="${OUT_MODULES}/firmware"
          git clone --depth 1 https://git.kernel.org/pub/scm/linux/kernel/git/firmware/linux-firmware.git ${SOURCE}
          cp -rf ${SOURCE}/intel/iwlwifi/* ${SOURCE}/ 2>/dev/null || true # Move intel firmware to top dir for easy search
          while read L; do
            [ -z "${L}" ] && continue
            if [ -e "${SOURCE}/${L}" ]; then
              mkdir -p "$(dirname "${DEST}/${L}")"
              cp -vf "${SOURCE}/${L}" "${DEST}/${L}"
            else
              echo "::warning ::Missing ${L}"
            fi
          done <<<$(find "${OUT_MODULES}" -name \*.ko -exec /sbin/modinfo -F firmware {} 2>/dev/null \;)

      - name: Check and Push
        run: |
          cd rr-modules
          git pull
          status=$(git status -s | grep -E 'thirdparty' | awk '{printf " %s", $2}')
          if [ -n "${status}" ]; then
            git add ${status}
            git commit -m "update $(date +%Y-%m-%d" "%H:%M:%S)"
            git push
          fi
